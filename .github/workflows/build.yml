name: Build desktop app

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            id: mac-arm64
            runner: macos-latest
            builder-args: --mac --arm64
          - name: macOS x64
            id: mac-x64
            runner: macos-latest
            builder-args: --mac --x64
          - name: Windows x64
            id: windows-x64
            runner: windows-latest
            builder-args: --win --x64
          - name: Linux x64
            id: linux-x64
            runner: ubuntu-latest
            builder-args: --linux --x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm version:apply-tag

      - name: Check package version
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: GITHUB_REF_NAME= pnpm version:check

      - name: Check release version
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm version:check

      - name: Run tests
        run: pnpm test

      - name: Build app
        run: pnpm build

      - name: Build installers
        run: pnpm exec electron-builder ${{ matrix.builder-args }} --publish never

      - name: Generate app.asar update manifest
        if: startsWith(github.ref, 'refs/tags/v') && matrix.id == 'mac-arm64'
        run: pnpm manifest:asar release release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raw-pair-cleaner-${{ matrix.id }}
          path: |
            release/**
            !release/**/*.blockmap

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish tag release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          make_latest: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.yml
            artifacts/**/raw-pair-cleaner-*-app.asar
            artifacts/**/latest-asar.json
