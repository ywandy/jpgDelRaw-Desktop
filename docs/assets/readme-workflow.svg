<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">RAW Pair Cleaner workflow</title>
  <desc id="desc">A five-step workflow from selecting a photo directory to scanning, comparing pairs, reviewing candidates, and moving files to the system trash.</desc>
  <defs>
    <filter id="shadow" x="-14%" y="-16%" width="128%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#574b3a" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f4efe8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="520" rx="30" fill="#fffdf8"/>
  <rect x="44" y="44" width="1192" height="432" rx="28" fill="#f4efe8" stroke="#e5dccc" stroke-width="2"/>
  <text x="86" y="102" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="850" fill="#28231f">安全清理工作流</text>
  <text x="86" y="134" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#7d7469">先扫描、再对比、再确认，最后移动到系统回收站</text>

  <path d="M236 280h132m110 0h132m110 0h132m110 0h132" stroke="#d8cbb9" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 22"/>

  <g filter="url(#shadow)">
    <g transform="translate(84 184)">
      <rect width="190" height="192" rx="24" fill="url(#panel)" stroke="#e5dccc" stroke-width="2"/>
      <circle cx="95" cy="58" r="34" fill="#e8f1e5"/>
      <path d="M73 62c0-12 10-22 22-22h11l9 11h22c12 0 22 10 22 22v18H73z" fill="#7ba17c" transform="scale(.72) translate(37 28)"/>
      <text x="95" y="118" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="800" fill="#28231f">选择目录</text>
      <text x="95" y="148" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#7d7469">拖拽或打开照片文件夹</text>
    </g>

    <g transform="translate(326 184)">
      <rect width="190" height="192" rx="24" fill="url(#panel)" stroke="#e5dccc" stroke-width="2"/>
      <circle cx="95" cy="58" r="34" fill="#e6f1f8"/>
      <path d="M80 83l19-19m-13-34a34 34 0 1 0 24 10" fill="none" stroke="#82b6d6" stroke-width="10" stroke-linecap="round"/>
      <text x="95" y="118" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="800" fill="#28231f">扫描文件</text>
      <text x="95" y="148" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#7d7469">识别 JPG、RAW、附属文件</text>
    </g>

    <g transform="translate(568 184)">
      <rect width="190" height="192" rx="24" fill="url(#panel)" stroke="#e5dccc" stroke-width="2"/>
      <circle cx="95" cy="58" r="34" fill="#fff0df"/>
      <rect x="64" y="45" width="38" height="42" rx="10" fill="#db7e5b"/>
      <rect x="92" y="30" width="42" height="57" rx="10" fill="#272b2a"/>
      <path d="M72 104c20 18 50 18 70 0" fill="none" stroke="#efb052" stroke-width="8" stroke-linecap="round"/>
      <text x="95" y="118" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="800" fill="#28231f">匹配对比</text>
      <text x="95" y="148" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#7d7469">按无扩展名小写 key 配对</text>
    </g>

    <g transform="translate(810 184)">
      <rect width="190" height="192" rx="24" fill="url(#panel)" stroke="#e5dccc" stroke-width="2"/>
      <circle cx="95" cy="58" r="34" fill="#f7e2e3"/>
      <path d="M75 49h46m-46 21h46m-46 21h30" stroke="#c95f64" stroke-width="9" stroke-linecap="round"/>
      <circle cx="133" cy="49" r="8" fill="#c95f64"/>
      <circle cx="133" cy="70" r="8" fill="#c95f64"/>
      <text x="95" y="118" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="800" fill="#28231f">人工复核</text>
      <text x="95" y="148" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#7d7469">查看待删除列表并取消勾选</text>
    </g>

    <g transform="translate(1052 184)">
      <rect width="190" height="192" rx="24" fill="url(#panel)" stroke="#e5dccc" stroke-width="2"/>
      <circle cx="95" cy="58" r="34" fill="#e8f1e5"/>
      <path d="M78 54h40l-4 47H82zm-7-12h54m-35 0v-9h16v9" fill="none" stroke="#4f7b52" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="95" y="118" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="800" fill="#28231f">移入回收站</text>
      <text x="95" y="148" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#7d7469">不硬删除，并写入 JSON 日志</text>
    </g>
  </g>
</svg>
